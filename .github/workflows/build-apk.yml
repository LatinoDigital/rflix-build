name: Build RFlix APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Clone source
        run: git clone --depth 1 https://github.com/LatinoDigital/rflix-build.git .
      - name: Download tools
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar
      - name: Restore native libs
        run: tar xzf lib_bundle.tar.gz
      - name: Build APK
        run: java -jar apktool.jar b . --use-aapt2 -o RFlix_v596.apk
      - name: Sign APK
        run: |
          java -jar uber-apk-signer.jar --apks RFlix_v596.apk \
            --ks rflix-release.keystore --ksAlias rflix \
            --ksPass rflix123 --ksKeyPass rflix123 -o .
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v596-build --yes 2>/dev/null || true
          gh release create v596-build \
            --title "RFlix v596 - Real Skip Intro (IntroDb + TorBox)" \
            --notes "Removed fake TMDB runtime guess. Skip Intro now uses IntroDb.app community timestamps with TorBox fallback. Only shows button when real data exists."
          gh release upload v596-build RFlix_v596-aligned-signed.apk
