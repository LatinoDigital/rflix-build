name: Build RFlix APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download tools
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar
          echo "Tools downloaded"

      - name: Restore native libs
        run: tar xzf lib_bundle.tar.gz && echo "Libs restored"

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > rflix-release.keystore

      - name: Build APK
        run: java -jar apktool.jar b . --use-aapt2 -o RFlix_v591.apk

      - name: Sign APK
        run: |
          java -jar uber-apk-signer.jar \
            --apks RFlix_v591.apk \
            --ks rflix-release.keystore \
            --ksAlias rflix \
            --ksPass rflix123 \
            --ksKeyPass rflix123 \
            -o .
          ls -lh RFlix_v591-aligned-signed.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RFlix-v591-signed
          path: RFlix_v591-aligned-signed.apk
          retention-days: 30
