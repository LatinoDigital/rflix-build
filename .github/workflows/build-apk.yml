name: Build RFlix APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag'
        required: true
        default: 'v591'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download tools
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar

      - name: Restore libs
        run: tar xzf lib_bundle.tar.gz

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > rflix-release.keystore

      - name: Build
        run: java -jar apktool.jar b . --use-aapt2 -o RFlix_${{ github.event.inputs.version }}.apk

      - name: Sign
        run: |
          java -jar uber-apk-signer.jar \
            --apks RFlix_${{ github.event.inputs.version }}.apk \
            --ks rflix-release.keystore --ksAlias rflix \
            --ksPass rflix123 --ksKeyPass rflix123 -o .

      - uses: actions/upload-artifact@v4
        with:
          name: RFlix-${{ github.event.inputs.version }}
          path: RFlix_${{ github.event.inputs.version }}-aligned-signed.apk
          retention-days: 30
