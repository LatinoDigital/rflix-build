name: Build RFlix APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Clone source
        run: git clone --depth 1 https://github.com/LatinoDigital/rflix-build.git .
      - name: Download tools
        run: |
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          wget -q https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar -O uber-apk-signer.jar
      - name: Restore native libs
        run: tar xzf lib_bundle.tar.gz
      - name: Build APK
        run: java -jar apktool.jar b . --use-aapt2 -o RFlix_v602.apk
      - name: Sign APK
        run: |
          java -jar uber-apk-signer.jar --apks RFlix_v602.apk \
            --ks rflix-release.keystore --ksAlias rflix \
            --ksPass rflix123 --ksKeyPass rflix123 -o .
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete v602-build --yes 2>/dev/null || true
          gh release create v602-build \
            --title "RFlix v602 - Full verified build (v595-v601)" \
            --notes "All features verified present: TorBox first, hardware audio, IntroDb skip intro, auto-skip toggle, category hide fix, internal player default, LTV reorder, Trakt Lists"
          gh release upload v602-build RFlix_v602-aligned-signed.apk
